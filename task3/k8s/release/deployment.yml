apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-release
  namespace: release
  labels:
    app: devops-app
    env: release
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
        - name: devops-app
          image: YOUR_DOCKER_USERNAME/devops-exam:1.0.0   # замінити
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: devops-app-release
  namespace: release
spec:
  selector:
    app: devops-app
  ports:
    - protocol: TCP
      port: 8003
      targetPort: 8000
  type: NodePort




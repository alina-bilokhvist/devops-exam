# .github/workflows/git-rollback.yml
name: Git Rollback (Delete Last Commit)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to rollback'
        required: true
        default: 'develop'
        type: string

jobs:
  rollback-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0 # Важливо завантажити всю історію

      - name: Reset and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "Current last commit: $(git log -1 --oneline)"
          
          # Відкочуємося на 1 коміт назад
          git reset --hard HEAD~1
          
          echo "New last commit: $(git log -1 --oneline)"
          
          # Примусово оновлюємо гілку в GitHub
          git push origin ${{ github.event.inputs.branch }} --force

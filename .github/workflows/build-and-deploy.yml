# .github/workflows/build-and-deploy.yml
name: Build and Deploy Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'both'
        type: choice
        options:
          - dev
          - release
          - both
      vm_ip:
        description: 'IP of target VM (with Minikube)'
        required: true
        type: string

jobs:
  # ============================================================
  # JOB 1: Збірка Docker образів
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application source (develop branch)
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: develop
          path: app-dev

      - name: Checkout application source (tag 1.0.0)
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: 1.0.0
          path: app-release

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push DEV image
        if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both'
        uses: docker/build-push-action@v5
        with:
          context: app-dev
          push: true
          # Лапки запобігають помилці "invalid reference format"
          tags: "${{ secrets.DOCKER_USERNAME }}/devops-exam:develop"

      - name: Build and push RELEASE image
        if: github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both'
        uses: docker/build-push-action@v5
        with:
          context: app-release
          push: true
          tags: "${{ secrets.DOCKER_USERNAME }}/devops-exam:1.0.0"

  # ============================================================
  # JOB 2: Розгортання
  # ============================================================
  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/exam_key
          chmod 600 /tmp/exam_key

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Get kubeconfig from VM
        run: |
          # Генеруємо переносний конфіг з вбудованими сертифікатами
          ssh -i /tmp/exam_key -o StrictHostKeyChecking=no root@${{ github.event.inputs.vm_ip }} \
          "kubectl config view --raw --flatten" > /tmp/kubeconfig
          
          # Замінюємо внутрішній IP на зовнішній
          sed -i "s/127.0.0.1/${{ github.event.inputs.vm_ip }}/g" /tmp/kubeconfig

      - name: Validate and Deploy DEV
        if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both'
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl apply -f task3/k8s/dev/namespace.yml
          sed "s|YOUR_DOCKER_USERNAME|${{ secrets.DOCKER_USERNAME }}|g" task3/k8s/dev/deployment.yml | kubectl apply -f -
          kubectl rollout status deployment/devops-app-dev -n dev --timeout=120s

      - name: Validate and Deploy RELEASE
        if: github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both'
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl apply -f task3/k8s/release/namespace.yml
          sed "s|YOUR_DOCKER_USERNAME|${{ secrets.DOCKER_USERNAME }}|g" task3/k8s/release/deployment.yml | kubectl apply -f -
          kubectl rollout status deployment/devops-app-release -n release --timeout=120s

      - name: Setup port-forwarding on VM
        run: |
          ssh -i /tmp/exam_key -o StrictHostKeyChecking=no root@${{ github.event.inputs.vm_ip }} << 'EOF'
            pkill -f "kubectl port-forward" || true
            sleep 2
            nohup kubectl port-forward svc/devops-app-dev 8002:8002 -n dev --address='0.0.0.0' > /var/log/pf-dev.log 2>&1 &
            nohup kubectl port-forward svc/devops-app-release 8003:8003 -n release --address='0.0.0.0' > /var/log/pf-release.log 2>&1 &
          EOF

      - name: Show deployment info
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "Application URLs:"
          echo "DEV: http://${{ github.event.inputs.vm_ip }}:8002"
          echo "RELEASE: http://${{ github.event.inputs.vm_ip }}:8003"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/exam_key /tmp/kubeconfig

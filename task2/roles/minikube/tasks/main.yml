---
- name: Download Minikube binary
  get_url:
    url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
    dest: /usr/local/bin/minikube
    mode: '0755'

- name: Cleanup Minikube and configs (Step 5 from example)
  shell: |
    minikube delete --all --purge
    rm -rf ~/.kube
    rm -rf ~/.minikube
  ignore_errors: yes
  become: yes
  environment:
    HOME: /root

- name: Start Minikube (Step 6 from example - Docker as root)
  shell: |
    minikube start \
      --driver=docker \
      --force \
      --listen-address=0.0.0.0 \
      --memory=4096mb \
      --cpus=2 \
      --ports=30000-32767:30000-32767
  become: yes
  environment:
    HOME: /root

- name: Enable Addons (Step 7 from example)
  command: minikube addons enable {{ item }}
  loop:
    - ingress
    - dashboard
    - metrics-server
  become: yes
  environment:
    HOME: /root

- name: Start Proxy in background (Step 9 from example)
  shell: |
    nohup kubectl proxy --address='0.0.0.0' --accept-hosts='.*' --port=8001 > /tmp/kubectl-proxy.log 2>&1 &
  become: yes
  async: 10
  poll: 0
  environment:
    HOME: /root

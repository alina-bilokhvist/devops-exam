# .github/workflows/rollback.yml
name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback (dev or release)'
        required: true
        type: choice
        options:
          - dev
          - release
      vm_ip:
        description: 'IP of target VM'
        required: true
        type: string

jobs:
  rollback:
    name: Rollback to previous version
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ github.event.inputs.vm_ip }} >> ~/.ssh/known_hosts

      - name: Execute Rollback on VM
        run: |
          # Визначаємо змінні на основі вибору користувача
          if [ "${{ github.event.inputs.environment }}" == "dev" ]; then
            DEPLOYMENT="devops-app-dev"
            NAMESPACE="dev"
          else
            DEPLOYMENT="devops-app-release"
            NAMESPACE="release"
          fi

          echo "Starting rollback for $DEPLOYMENT in namespace $NAMESPACE..."

          # Виконуємо відкат безпосередньо на VM через SSH
          ssh root@${{ github.event.inputs.vm_ip }} << EOF
            echo "--- Current History ---"
            kubectl rollout history deployment/$DEPLOYMENT -n $NAMESPACE
            
            echo "--- Performing Undo ---"
            kubectl rollout undo deployment/$DEPLOYMENT -n $NAMESPACE
            
            echo "--- Waiting for Status ---"
            kubectl rollout status deployment/$DEPLOYMENT -n $NAMESPACE --timeout=60s
            
            echo "--- New History ---"
            kubectl rollout history deployment/$DEPLOYMENT -n $NAMESPACE
          EOF

      - name: Create Summary
        if: success()
        run: |
          echo "### Rollback Successful! :rewind:" >> $GITHUB_STEP_SUMMARY
          echo "Environment: **${{ github.event.inputs.environment }}**" >> $GITHUB_STEP_SUMMARY
          echo "Target VM: \`${{ github.event.inputs.vm_ip }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: rm -rf ~/.ssh/id_rsa


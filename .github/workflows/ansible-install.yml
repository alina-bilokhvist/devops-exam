# .github/workflows/ansible-install.yml
name: Ansible Install Components

on:
  workflow_dispatch:
    inputs:
      vm_ip:
        description: 'IP address of target VM'
        required: true
        type: string

jobs:
  install:
    name: Install Kubernetes, Minikube, Helm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip
          pip3 install ansible
          # Перевіряємо версію для дебагу
          ansible --version

      - name: Setup Ansible Config
        run: |
          # Створюємо або перезаписуємо ansible.cfg, щоб уникнути конфліктів плагінів
          cat <<EOF > ansible.cfg
          [defaults]
          inventory           = inventory/hosts.yml
          host_key_checking   = False
          stdout_callback     = yaml
          bin_ansible_callbacks = True
          EOF

      - name: Pre-installation checks (Ansible check mode)
        env:
          # Примусово вказуємо шлях до конфігу та вимикаємо застарілий плагін через ENV
          ANSIBLE_CONFIG: ./ansible.cfg
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          ansible-playbook playbooks/check.yml \
            -i "${{ github.event.inputs.vm_ip }}," \
            --extra-vars "target_ip=${{ github.event.inputs.vm_ip }}" \
            --check


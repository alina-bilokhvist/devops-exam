# .github/workflows/terraform-destroy.yml
name: Terraform Destroy

on:
  workflow_dispatch:   # Запуск тільки вручну

env:
  TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
  TF_VAR_surname: "bilokhvist" # Не забудьте змінити на ваше прізвище, якщо потрібно
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  
  # Додаємо ці змінні для авторизації провайдера (щоб не було запиту var.spaces_access_key)
  TF_VAR_spaces_access_key: ${{ secrets.SPACES_ACCESS_KEY }}
  TF_VAR_spaces_secret_key: ${{ secrets.SPACES_SECRET_KEY }}
  
  # Ці змінні потрібні для доступу до Backend (стейт-файлу)
  AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: |
          terraform init \
            -input=false \
            -backend-config="access_key=${{ secrets.SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SPACES_SECRET_KEY }}"

      - name: Terraform Destroy
        # Додано -input=false, щоб уникнути інтерактивних запитів
        run: terraform destroy -auto-approve -input=false



---
# 1. ВИДАЛЯЄМО КОНФЛІКТНІ ФАЙЛИ (Це виправить вашу помилку)
- name: Remove conflicting Docker repository files to unblock apt
  file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list

# 2. ОНОВЛЮЄМО КЕШ (Тепер він пройде без помилок)
- name: Update apt cache
  apt:
    update_cache: yes
    # Прибираємо cache_valid_time, щоб примусово оновити кеш після видалення файлів
    force_apt_get: yes

# 3. ВСТАНОВЛЮЄМО ПАКЕТИ
- name: Install required packages
  apt:
    name:
      - curl
      - wget
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - conntrack
      - socat
    state: present

- name: Create a new user for Minikube
  user:
    name: devops
    shell: /bin/bash
    groups: docker,sudo
    append: yes
    create_home: yes

- name: Allow devops user to use sudo without password
  copy:
    content: "devops ALL=(ALL) NOPASSWD:ALL"
    dest: /etc/sudoers.d/devops
    mode: '0440'

- name: Remove conflicting repository files
  file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/kubernetes.list

- name: Update apt cache
  apt:
    update_cache: yes
    force_apt_get: yes

- name: Install dependencies for Minikube and Docker
  apt:
    name:
      - curl
      - wget
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - conntrack  # ОБОВ'ЯЗКОВО
      - socat      # ОБОВ'ЯЗКОВО
    state: present

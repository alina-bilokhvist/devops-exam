---
- name: Download Minikube binary
  get_url:
    url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
    dest: /usr/local/bin/minikube
    mode: '0755'

- name: Cleanup previous state
  shell: |
    minikube delete --all --purge
    rm -rf ~/.kube ~/.minikube
  ignore_errors: yes
  become: yes
  environment:
    HOME: /root

- name: Start Minikube (THE ONLY WORKING WAY ON VM)
  shell: |
    minikube start \
      --driver=none \
      --force \
      --listen-address=0.0.0.0
  become: yes
  environment:
    HOME: /root

- name: Wait for nodes to be ready
  command: kubectl wait --for=condition=Ready nodes --all --timeout=120s
  become: yes
  environment:
    HOME: /root

- name: Enable Ingress
  shell: minikube addons enable ingress
  become: yes
  environment:
    HOME: /root

- name: Start Proxy in background
  shell: |
    nohup kubectl proxy --address='0.0.0.0' --accept-hosts='.*' --port=8001 > /tmp/kubectl-proxy.log 2>&1 &
  become: yes
  async: 10
  poll: 0
  environment:
    HOME: /root


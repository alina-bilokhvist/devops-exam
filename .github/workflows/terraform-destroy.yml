# .github/workflows/terraform-apply.yml
name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'task1/**'
  workflow_dispatch:

env:
  TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
  TF_VAR_surname: "bilokhvist"          # Замініть на своє прізвище
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SPACES_SECRET_KEY }}"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      # ПЕРЕВІРКА ПРАВИЛЬНОСТІ (без розгортання)
      # Якщо plan завершується з помилкою — pipeline зупиняється
      - name: Terraform Plan
        id: plan
        run: terraform plan -detailed-exitcode -out=tfplan
        # exit code 0 = no changes, 1 = error, 2 = changes planned
        # Якщо exit code 1 — крок завершиться з помилкою і pipeline зупиниться

      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == '2' || steps.plan.outputs.exitcode == '0'
        run: terraform apply -auto-approve tfplan

      - name: Show Outputs
        run: terraform output



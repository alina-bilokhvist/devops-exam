# .github/workflows/build-and-deploy.yml
name: Build and Deploy Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'both'
        type: choice
        options:
          - dev
          - release
          - both
      vm_ip:
        description: 'IP of target VM (with Minikube)'
        required: true
        type: string

jobs:
  # ============================================================
  # JOB 1: Збірка Docker образів
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application source (develop branch)
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: develop
          path: app-dev

      - name: Checkout application source (tag 1.0.0)
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: 1.0.0
          path: app-release

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push DEV image
        if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both'
        uses: docker/build-push-action@v5
        with:
          context: app-dev
          push: true
          tags: "${{ secrets.DOCKER_USERNAME }}/devops-exam:develop"

      - name: Build and push RELEASE image
        if: github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both'
        uses: docker/build-push-action@v5
        with:
          context: app-release
          push: true
          tags: "${{ secrets.DOCKER_USERNAME }}/devops-exam:1.0.0"

  # ============================================================
  # JOB 2: Розгортання
  # ============================================================
  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ github.event.inputs.vm_ip }} >> ~/.ssh/known_hosts

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Get kubeconfig from VM
        run: |
          # Використовуємо -i ~/.ssh/id_rsa для надійності
          ssh -o StrictHostKeyChecking=no root@${{ github.event.inputs.vm_ip }} \
          "kubectl config view --raw --flatten" > /tmp/kubeconfig
          
          # Замінюємо адресу API сервера. Якщо Minikube використовує порт 8443, переконайтеся, що він доступний зовні.
          # Ми замінюємо 127.0.0.1 або внутрішню IP minikube на зовнішню IP віртуальної машини.
          sed -i "s|server: https://.*:8443|server: https://${{ github.event.inputs.vm_ip }}:8443|g" /tmp/kubeconfig
          # Також про всяк випадок загальна заміна 127.0.0.1
          sed -i "s/127.0.0.1/${{ github.event.inputs.vm_ip }}/g" /tmp/kubeconfig

      - name: Validate and Deploy DEV
        if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both'
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl apply -f task3/k8s/dev/namespace.yml
          sed "s|YOUR_DOCKER_USERNAME|${{ secrets.DOCKER_USERNAME }}|g" task3/k8s/dev/deployment.yml | kubectl apply -f -
          kubectl rollout status deployment/devops-app-dev -n dev --timeout=120s

      - name: Validate and Deploy RELEASE
        if: github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both'
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl apply -f task3/k8s/release/namespace.yml
          sed "s|YOUR_DOCKER_USERNAME|${{ secrets.DOCKER_USERNAME }}|g" task3/k8s/release/deployment.yml | kubectl apply -f -
          kubectl rollout status deployment/devops-app-release -n release --timeout=120s

      - name: Setup port-forwarding on VM
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ github.event.inputs.vm_ip }} << 'EOF'
            # Вбиваємо старі процеси, щоб звільнити порти
            pkill -f "kubectl port-forward" || true
            sleep 2
            # Запуск у фоні. Важливо: --address='0.0.0.0' дозволяє доступ ззовні
            nohup kubectl port-forward svc/devops-app-dev 8002:8002 -n dev --address='0.0.0.0' > /dev/null 2>&1 &
            nohup kubectl port-forward svc/devops-app-release 8003:8003 -n release --address='0.0.0.0' > /dev/null 2>&1 &
          EOF

      - name: Show deployment info
        run: |
          echo "### Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| DEV | http://${{ github.event.inputs.vm_ip }}:8002 |" >> $GITHUB_STEP_SUMMARY
          echo "| RELEASE | http://${{ github.event.inputs.vm_ip }}:8003 |" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: rm -rf ~/.ssh/id_rsa /tmp/kubeconfig


---
# 1. Очищення конфліктних репозиторіїв (щоб apt update не падав)
- name: Remove all conflicting repository files
  file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
    - /etc/apt/sources.list.d/kubernetes.list

# 2. Оновлення кешу та встановлення системних залежностей
- name: Update apt and install core dependencies
  apt:
    name:
      - curl
      - wget
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - conntrack  # КРИТИЧНО для роботи мережі Kubernetes
      - socat      # КРИТИЧНО для проксі та портів
      - software-properties-common
    state: present
    update_cache: yes
    force_apt_get: yes

# 3. Підготовка групи для Docker (щоб не було помилок при створенні юзера)
- name: Ensure docker group exists
  group:
    name: docker
    state: present

# 4. Створення користувача devops (про всяк випадок, хоча працюємо від root)
- name: Create devops user
  user:
    name: devops
    shell: /bin/bash
    groups: docker,sudo
    append: yes
    create_home: yes

- name: Allow devops user to use sudo without password
  copy:
    content: "devops ALL=(ALL) NOPASSWD:ALL"
    dest: /etc/sudoers.d/devops
    mode: '0440'

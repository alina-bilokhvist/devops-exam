# .github/workflows/build-and-deploy.yml
name: Build and Deploy Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'both'
        type: choice
        options:
          - dev
          - release
          - both
      vm_ip:
        description: 'IP of target VM (with Minikube)'
        required: true
        type: string

jobs:
  # ============================================================
  # JOB 1: Збірка Docker образів
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application source (develop branch)
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: develop
          path: app-dev

      - name: Checkout application source (tag 1.0.0)
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: 1.0.0
          path: app-release

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push DEV image
        if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both'
        uses: docker/build-push-action@v5
        with:
          context: app-dev
          push: true
          tags: "${{ secrets.DOCKER_USERNAME }}/devops-exam:develop"

      - name: Build and push RELEASE image
        if: github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both'
        uses: docker/build-push-action@v5
        with:
          context: app-release
          push: true
          tags: "${{ secrets.DOCKER_USERNAME }}/devops-exam:1.0.0"

  # ============================================================
  # JOB 2: Розгортання через SSH (Remote Execution)
  # ============================================================
  deploy:
    name: Deploy to Kubernetes via SSH
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ github.event.inputs.vm_ip }} >> ~/.ssh/known_hosts

      - name: Deploy DEV environment
        if: github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both'
        run: |
          # Копіюємо маніфести на VM
          ssh root@${{ github.event.inputs.vm_ip }} "mkdir -p /tmp/k8s-dev"
          scp task3/k8s/dev/*.yml root@${{ github.event.inputs.vm_ip }}:/tmp/k8s-dev/
          
          # Виконуємо команди локально на VM
          ssh root@${{ github.event.inputs.vm_ip }} << EOF
            kubectl apply -f /tmp/k8s-dev/namespace.yml
            sed "s|YOUR_DOCKER_USERNAME|${{ secrets.DOCKER_USERNAME }}|g" /tmp/k8s-dev/deployment.yml | kubectl apply -f -
            kubectl rollout status deployment/devops-app-dev -n dev --timeout=120s
            
            # Налаштування Port-forwarding
            pkill -f "port-forward.*8002" || true
            nohup kubectl port-forward svc/devops-app-dev 8002:8002 -n dev --address='0.0.0.0' > /dev/null 2>&1 &
          EOF

      - name: Deploy RELEASE environment
        if: github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both'
        run: |
          # Копіюємо маніфести на VM
          ssh root@${{ github.event.inputs.vm_ip }} "mkdir -p /tmp/k8s-release"
          scp task3/k8s/release/*.yml root@${{ github.event.inputs.vm_ip }}:/tmp/k8s-release/
          
          # Виконуємо команди локально на VM
          ssh root@${{ github.event.inputs.vm_ip }} << EOF
            kubectl apply -f /tmp/k8s-release/namespace.yml
            sed "s|YOUR_DOCKER_USERNAME|${{ secrets.DOCKER_USERNAME }}|g" /tmp/k8s-release/deployment.yml | kubectl apply -f -
            kubectl rollout status deployment/devops-app-release -n release --timeout=120s
            
            # Налаштування Port-forwarding
            pkill -f "port-forward.*8003" || true
            nohup kubectl port-forward svc/devops-app-release 8003:8003 -n release --address='0.0.0.0' > /dev/null 2>&1 &
          EOF

      - name: Show summary info
        run: |
          echo "### Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-----|" >> $GITHUB_STEP_SUMMARY
          [ "${{ github.event.inputs.environment }}" != "release" ] && echo "| DEV | http://${{ github.event.inputs.vm_ip }}:8002 |" >> $GITHUB_STEP_SUMMARY
          [ "${{ github.event.inputs.environment }}" != "dev" ] && echo "| RELEASE | http://${{ github.event.inputs.vm_ip }}:8003 |" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: rm -rf ~/.ssh/id_rsa

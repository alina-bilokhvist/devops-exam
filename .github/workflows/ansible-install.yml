# .github/workflows/ansible-install.yml
name: Ansible Install Components

on:
  workflow_dispatch:
    inputs:
      vm_ip:
        description: 'IP address of target VM'
        required: true
        type: string

jobs:
  install:
    name: Install Kubernetes, Minikube, Helm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # КРОК 1: Встановлення SSH ключа для доступу до VM
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip
          pip3 install ansible
          ansible --version

      - name: Setup Ansible Config
        run: |
          cat <<EOF > ansible.cfg
          [defaults]
          inventory           = inventory/hosts.yml
          host_key_checking   = False
          stdout_callback     = default
          bin_ansible_callbacks = True
          result_format       = yaml
          # ВИПРАВЛЕННЯ: Вказуємо шлях до ролей, бо вони в task2/roles
          roles_path          = ./roles
          EOF

      # КРОК 2: Перевірка (Check mode)
      - name: Pre-installation checks (Ansible check mode)
        env:
          ANSIBLE_CONFIG: ./ansible.cfg
          ANSIBLE_STDOUT_CALLBACK: default
          ANSIBLE_RESULT_FORMAT: yaml
        run: |
          ansible-playbook playbooks/check.yml \
            -i "${{ github.event.inputs.vm_ip }}," \
            -u root \
            --extra-vars "target_ip=${{ github.event.inputs.vm_ip }}" \
            --check

      # КРОК 3: Реальна інсталяція
      - name: Run Main Installation
        env:
          ANSIBLE_CONFIG: ./ansible.cfg
          ANSIBLE_STDOUT_CALLBACK: default
          ANSIBLE_RESULT_FORMAT: yaml
        run: |
          ansible-playbook playbooks/install.yml \
            -i "${{ github.event.inputs.vm_ip }}," \
            -u root \
            --extra-vars "target_ip=${{ github.event.inputs.vm_ip }}"

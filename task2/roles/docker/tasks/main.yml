---
- name: Install dependencies for Docker
  apt:
    name: [ 'apt-transport-https', 'ca-certificates', 'curl', 'gnupg', 'lsb-release' ]
    state: present
    update_cache: yes

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

# ВИПРАВЛЕННЯ: Видаляємо старі файли, які викликають помилку "Conflicting values"
- name: Remove old Docker repository files to avoid conflicts
  file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list

- name: Download Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor --yes -o /etc/apt/keyrings/docker.gpg
  args:
    # Ми прибрали creates, щоб переписати ключ, якщо він був пошкоджений
    executable: /bin/bash

- name: Add Docker repository
  apt_repository:
    # Використовуємо один чіткий файл 'docker.list' через параметр filename
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker components
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Enable and start Docker service
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Add root user to docker group
  user:
    name: root
    groups: docker
    append: yes

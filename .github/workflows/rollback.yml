# .github/workflows/rollback-git.yml
name: Git Rollback (Delete Last Commit)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Гілка, з якої треба видалити останній коміт'
        required: true
        default: 'main'
        type: string

# ДОДАЄМО ПРАВО НА WORKFLOWS
permissions:
  contents: write
  workflows: write

jobs:
  rollback-commit:
    name: Remove Last Commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reset and Force Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Відкат на 1 коміт назад
          git reset --hard HEAD~1
          
          # Force push у вказану гілку
          git push origin ${{ github.event.inputs.branch }} --force

      - name: Summary
        if: success()
        run: |
          echo "### Git Rollback Successful! :wastebasket:" >> $GITHUB_STEP_SUMMARY
          echo "Останній коміт з файлами воркфлоу успішно видалено." >> $GITHUB_STEP_SUMMARY
